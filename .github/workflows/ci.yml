# CI Workflow — runs on every push and pull request.
# Builds both flavors (googletv, firetv) and runs unit tests.
# A green CI badge on every commit is required for release (AC-8.5).

name: CI

on:
  push:
    branches: [ "main", "develop", "claude/**" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  build-and-test:
    name: Build & Unit Tests
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out the repository code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Set up JDK 17 (required for AGP 8.x and Kotlin 1.9.x)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # Step 3: Grant execute permission to the Gradle wrapper
      - name: Grant Gradle wrapper execute permission
        run: chmod +x gradlew

      # Step 4: Build the Google TV debug APK
      # This verifies that the googletv flavor compiles without errors
      - name: Build Google TV (debug)
        run: ./gradlew assembleGoogletvDebug --stacktrace 2>&1 | tee /tmp/build-googletv.txt; exit ${PIPESTATUS[0]}

      # Step 5: Build the Fire TV debug APK
      # This verifies that the firetv flavor compiles without errors
      - name: Build Fire TV (debug)
        run: ./gradlew assembleFiretvDebug

      # Step 6: Run unit tests for both flavors
      # Unit tests run on the build machine (no Android device needed)
      - name: Run unit tests
        run: ./gradlew test

      # Step 7: Upload test results as artifacts (visible in GitHub Actions UI)
      # Even if tests fail, the results are uploaded so we can see what failed
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: app/build/reports/tests/
          retention-days: 30

      # Step 8: Upload build output on failure (for debugging)
      - name: Upload build output (on failure)
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: build-output
          path: /tmp/build-googletv.txt
          retention-days: 7

      # Step 9: Upload APKs as artifacts (for manual testing on real devices)
      - name: Upload APKs
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: debug-apks
          path: |
            app/build/outputs/apk/googletv/debug/app-googletv-debug.apk
            app/build/outputs/apk/firetv/debug/app-firetv-debug.apk
          retention-days: 7
