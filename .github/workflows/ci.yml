name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  jvm-tests:
    name: JVM protocol tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant Gradle wrapper execute permission
        run: chmod +x gradlew

      - name: Run JVM protocol test suite
        run: ./gradlew :test-runner:test --stacktrace

      - name: Upload JVM test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jvm-test-report
          path: test-runner/build/reports/tests/test/
          retention-days: 30
          if-no-files-found: ignore

  android-build:
    name: Android lint & debug APK (${{ matrix.flavor }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Phone-focused fork: we only build and lint the phone flavor.
        include:
          - flavor: phone
            lint_task: :app:lintPhoneDebug
            assemble_task: :app:assemblePhoneDebug
            apk_path: app/build/outputs/apk/phone/debug/app-phone-debug.apk

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant Gradle wrapper execute permission
        run: chmod +x gradlew

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-35 build-tools;35.0.0'

      - name: Write local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Lint and build debug APKs
        run: ./gradlew ${{ matrix.lint_task }} ${{ matrix.assemble_task }} --stacktrace

      - name: Upload build reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-reports
          path: app/build/reports/
          retention-days: 30
          if-no-files-found: ignore

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: debug-apk-${{ matrix.flavor }}
          path: ${{ matrix.apk_path }}
          retention-days: 7
